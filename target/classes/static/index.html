<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Calendar App</title>
    <!-- Tailwind CSS qua CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans text-slate-800">
    
    <div class="max-w-6xl mx-auto mt-10 p-6 bg-white rounded-xl shadow-lg border border-slate-100">
        <div class="flex justify-between items-center mb-8 pb-4 border-b">
            <div>
                <h1 class="text-3xl font-bold text-slate-800">My Appointments</h1>
                <p class="text-slate-500 text-sm mt-1">Manage your schedule efficiently</p>
            </div>
            <button onclick="openModal()" class="bg-indigo-600 hover:bg-indigo-700 transition duration-200 text-white font-medium py-2.5 px-5 rounded-lg shadow-md flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd" />
                </svg>
                Add Appointment
            </button>
        </div>

        <!-- Danh sách Lịch -->
        <div id="calendar-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
            <!-- Dữ liệu render từ JS -->
        </div>
    </div>

    <!-- Modal Form -->
    <div id="appointmentModal" class="fixed inset-0 bg-slate-900 bg-opacity-40 backdrop-blur-sm hidden flex justify-center items-center z-50">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-md p-7 transform transition-all">
            <h2 class="text-2xl font-bold mb-6 text-slate-800">New Appointment</h2>
            <form id="appointmentForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Name</label>
                    <input type="text" id="name" required class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Location</label>
                    <input type="text" id="location" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Start Time</label>
                        <input type="datetime-local" id="startTime" required class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">End Time</label>
                        <input type="datetime-local" id="endTime" required class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">
                    </div>
                </div>
                
                <div class="flex justify-end gap-3 mt-8 pt-4 border-t">
                    <button type="button" onclick="closeModal()" class="px-5 py-2.5 text-slate-600 font-medium hover:bg-slate-100 rounded-lg transition">Cancel</button>
                    <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium px-5 py-2.5 rounded-lg shadow transition">Save Appointment</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_URL = '/api/appointments';
        const CURRENT_USER_ID = 1;

        document.addEventListener('DOMContentLoaded', fetchAppointments);

        function openModal() {
            document.getElementById('appointmentModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('appointmentModal').classList.add('hidden');
            document.getElementById('appointmentForm').reset();
        }

        async function fetchAppointments() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                renderAppointments(data);
            } catch (error) {
                console.error("Lỗi khi lấy dữ liệu:", error);
            }
        }

        function renderAppointments(appointments) {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';
            appointments.forEach(app => {
                const isGroup = app.dtype === 'GROUP_MEETING';
                const badge = isGroup 
                    ? `<span class="bg-emerald-100 text-emerald-700 text-xs font-bold px-2 py-1 rounded-md">Group Meeting</span>` 
                    : `<span class="bg-indigo-100 text-indigo-700 text-xs font-bold px-2 py-1 rounded-md">Personal</span>`;
                
                grid.innerHTML += `
                    <div class="border border-slate-200 p-5 rounded-xl bg-white hover:shadow-lg hover:border-indigo-100 transition duration-300">
                        <div class="flex justify-between items-start mb-3">
                            <h3 class="font-bold text-lg text-slate-800 line-clamp-1" title="${app.name}">${app.name}</h3>
                            ${badge}
                        </div>
                        <div class="space-y-2 text-sm text-slate-600">
                            <p class="flex items-center gap-2">
                                📍 <span>${app.location || 'No location'}</span>
                            </p>
                            <p class="flex items-center gap-2">
                                🕒 <span>${new Date(app.startTime).toLocaleString()}</span>
                            </p>
                            <p class="flex items-center gap-2">
                                ⏳ <span>${app.duration} mins</span>
                            </p>
                        </div>
                    </div>
                `;
            });
        }

        document.getElementById('appointmentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const location = document.getElementById('location').value;
            const startTime = document.getElementById('startTime').value;
            const endTime = document.getElementById('endTime').value;
            
            const start = new Date(startTime);
            const end = new Date(endTime);
            const duration = (end - start) / 60000;

            if (duration <= 0) {
                alert("Lỗi: Thời gian kết thúc phải lớn hơn thời gian bắt đầu (Duration > 0)!");
                return;
            }

            const appointmentData = { name, location, startTime, endTime, duration };
            await submitAppointment(appointmentData);
        });

        async function submitAppointment(data) {
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    alert("✅ Đã thêm lịch thành công!");
                    closeModal();
                    fetchAppointments();
                } else if (response.status === 409) {
                    const result = await response.json();
                    
                    if (result.type === 'GROUP_JOIN') {
                        const join = confirm(`${result.message}\n\nBạn có muốn JOIN vào cuộc họp nhóm này thay vì tạo lịch mới không?`);
                        if (join) {
                            await joinGroupMeeting(result.meetingId);
                        }
                    } else if (result.type === 'TIME_CONFLICT') {
                        const replace = confirm(`${result.message}\n\nBạn có muốn XÓA lịch cũ và THAY THẾ bằng lịch này không?`);
                        if (replace) {
                            await replaceAppointment(result.conflictId, data);
                        }
                    }
                } else {
                    const errMsg = await response.json();
                    alert("Lỗi: " + errMsg.message);
                }
            } catch (error) {
                console.error("Lỗi:", error);
            }
        }

        async function joinGroupMeeting(meetingId) {
            const res = await fetch(`${API_URL}/join-group?meetingId=${meetingId}&userId=${CURRENT_USER_ID}`, { method: 'POST' });
            if (res.ok) {
                alert("🎉 Bạn đã tham gia cuộc họp nhóm thành công!");
                closeModal();
                fetchAppointments();
            }
        }

        async function replaceAppointment(oldId, newData) {
            const res = await fetch(`${API_URL}/replace/${oldId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(newData)
            });
            if (res.ok) {
                alert("🔄 Đã thay thế lịch cũ thành công!");
                closeModal();
                fetchAppointments();
            }
        }
    </script>
</body>
</html>
