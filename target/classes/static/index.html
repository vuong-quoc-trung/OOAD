<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar System</title>
    <link rel="stylesheet" href="/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <main class="page">
        <section id="login-box" class="panel">
            <h1>Login</h1>
            <form id="login-form" class="form">
                <label>
                    Username
                    <input id="username" type="text" autocomplete="username" required>
                </label>
                <label>
                    Password
                    <input id="password" type="password" autocomplete="current-password" required>
                </label>
                <button type="submit">Login</button>
            </form>
        </section>

        <section id="app-box" class="hidden">
            <div class="topbar">
                <h1>Calendar System</h1>
                <div>
                    <span id="current-user"></span>
                    <button id="logout-button" type="button" class="secondary">Logout</button>
                </div>
            </div>

            <section class="panel">
                <h2>Create Appointment</h2>
                <form id="appointment-form" class="form grid">
                    <label>
                        Title
                        <input id="title" type="text" required>
                    </label>
                    <label>
                        Type
                        <select id="type">
                            <option value="PERSONAL">PERSONAL</option>
                            <option value="GROUP">GROUP</option>
                        </select>
                    </label>
                    <label>
                        Start time
                        <input id="startTime" type="datetime-local" required>
                    </label>
                    <label>
                        End time
                        <input id="endTime" type="datetime-local" required>
                    </label>
                    <button type="submit">Save</button>
                </form>
            </section>

            <section class="panel">
                <div class="list-head">
                    <h2>Appointments</h2>
                    <button id="reload-button" type="button" class="secondary">Reload</button>
                </div>
                <div id="appointments"></div>
            </section>
        </section>
    </main>

    <script src="/app.js"></script>
</body>
</html>
